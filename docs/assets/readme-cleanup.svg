<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">AnyText cleanup schedule</title>
  <desc id="desc">Cleanup flow: find expired rows, delete storage objects, delete attachment records, delete empty messages.</desc>
  <rect width="1200" height="360" rx="24" fill="#070a0c"/>
  <text x="48" y="62" fill="#befc3c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="4">CLEANUP SCHEDULE</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="56" y="122" width="250" height="120" rx="18" fill="#101518" stroke="#344049"/>
    <text x="181" y="172" fill="#f8fafc" font-size="22" font-weight="800">Find expired</text>
    <text x="181" y="204" fill="#8da2bf" font-size="16">or deleted records</text>
    <rect x="336" y="122" width="250" height="120" rx="18" fill="#101518" stroke="#344049"/>
    <text x="461" y="172" fill="#f8fafc" font-size="22" font-weight="800">Remove objects</text>
    <text x="461" y="204" fill="#8da2bf" font-size="16">from private Storage</text>
    <rect x="616" y="122" width="250" height="120" rx="18" fill="#101518" stroke="#344049"/>
    <text x="741" y="172" fill="#f8fafc" font-size="22" font-weight="800">Delete metadata</text>
    <text x="741" y="204" fill="#8da2bf" font-size="16">attachment rows</text>
    <rect x="896" y="122" width="250" height="120" rx="18" fill="#1d2a18" stroke="#86bf1f"/>
    <text x="1021" y="172" fill="#befc3c" font-size="22" font-weight="800">Finalize</text>
    <text x="1021" y="204" fill="#d9f99d" font-size="16">empty messages gone</text>
  </g>
  <path d="M306 182H326M586 182H606M866 182H886" stroke="#befc3c" stroke-width="3"/>
  <text x="600" y="304" fill="#8da2bf" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Run every 5 minutes with ANYTEXT_CLEANUP_TOKEN.</text>
</svg>
