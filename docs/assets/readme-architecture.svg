<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="460" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">AnyText architecture</title>
  <desc id="desc">Browser app connects to restricted Supabase RPC, storage, edge functions, and realtime; GitHub Pages hosts the static app.</desc>
  <rect width="1200" height="460" rx="24" fill="#070a0c"/>
  <text x="48" y="60" fill="#befc3c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="4">ARCHITECTURE</text>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#befc3c"/></marker></defs>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="72" y="154" width="252" height="150" rx="18" fill="#101518" stroke="#344049"/>
    <text x="198" y="214" fill="#f8fafc" font-size="26" font-weight="800">Browser App</text>
    <text x="198" y="248" fill="#8da2bf" font-size="17">Vite + React + Tailwind</text>
    <rect x="474" y="84" width="252" height="96" rx="18" fill="#101518" stroke="#344049"/>
    <text x="600" y="126" fill="#f8fafc" font-size="23" font-weight="800">Restricted RPC</text>
    <text x="600" y="154" fill="#8da2bf" font-size="15">room-scoped operations</text>
    <rect x="474" y="214" width="252" height="96" rx="18" fill="#101518" stroke="#344049"/>
    <text x="600" y="256" fill="#f8fafc" font-size="23" font-weight="800">Private Storage</text>
    <text x="600" y="284" fill="#8da2bf" font-size="15">signed upload/download</text>
    <rect x="474" y="344" width="252" height="76" rx="18" fill="#101518" stroke="#344049"/>
    <text x="600" y="390" fill="#f8fafc" font-size="23" font-weight="800">Realtime</text>
    <rect x="880" y="154" width="252" height="150" rx="18" fill="#1d2a18" stroke="#86bf1f"/>
    <text x="1006" y="214" fill="#befc3c" font-size="26" font-weight="800">Supabase</text>
    <text x="1006" y="248" fill="#d9f99d" font-size="17">Postgres + Edge Functions</text>
    <text x="1006" y="276" fill="#d9f99d" font-size="17">Storage + Broadcasts</text>
  </g>
  <g stroke="#befc3c" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M324 220C390 180 408 130 462 130"/>
    <path d="M324 238C390 238 408 262 462 262"/>
    <path d="M324 256C390 300 408 382 462 382"/>
    <path d="M728 132C794 132 808 210 868 210"/>
    <path d="M728 262C794 262 808 238 868 238"/>
    <path d="M728 382C804 382 806 276 868 276"/>
  </g>
  <rect x="72" y="336" width="252" height="54" rx="16" fill="#111719" stroke="#344049"/>
  <text x="198" y="370" text-anchor="middle" fill="#8da2bf" font-family="Inter, Arial, sans-serif" font-size="17">Hosted by GitHub Pages</text>
</svg>
