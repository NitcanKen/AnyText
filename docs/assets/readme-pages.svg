<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">AnyText GitHub Pages deployment</title>
  <desc id="desc">GitHub Actions pipeline: push main, install, lint, test, build, deploy Pages.</desc>
  <rect width="1200" height="360" rx="24" fill="#070a0c"/>
  <text x="48" y="62" fill="#befc3c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="700" letter-spacing="4">GITHUB PAGES DEPLOYMENT</text>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="132" width="154" height="96" rx="18" fill="#101518" stroke="#344049"/><text x="147" y="188" fill="#f8fafc" font-size="21" font-weight="800">Push main</text>
    <rect x="258" y="132" width="154" height="96" rx="18" fill="#101518" stroke="#344049"/><text x="335" y="188" fill="#f8fafc" font-size="21" font-weight="800">npm ci</text>
    <rect x="446" y="132" width="154" height="96" rx="18" fill="#101518" stroke="#344049"/><text x="523" y="188" fill="#f8fafc" font-size="21" font-weight="800">Lint</text>
    <rect x="634" y="132" width="154" height="96" rx="18" fill="#101518" stroke="#344049"/><text x="711" y="188" fill="#f8fafc" font-size="21" font-weight="800">Test</text>
    <rect x="822" y="132" width="154" height="96" rx="18" fill="#101518" stroke="#344049"/><text x="899" y="188" fill="#f8fafc" font-size="21" font-weight="800">Build</text>
    <rect x="1010" y="132" width="154" height="96" rx="18" fill="#1d2a18" stroke="#86bf1f"/><text x="1087" y="188" fill="#befc3c" font-size="21" font-weight="800">Deploy</text>
  </g>
  <path d="M225 180H255M413 180H443M601 180H631M789 180H819M977 180H1007" stroke="#befc3c" stroke-width="3"/>
  <text x="600" y="286" fill="#8da2bf" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">The app is static; runtime Supabase config comes from repository variable/secret during build.</text>
</svg>
