<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">AnyText transfer flow</title>
  <desc id="desc">A four step flow: pair once, paste or drop, send, receive and copy.</desc>
  <rect width="1200" height="420" rx="24" fill="#070a0c"/>
  <g stroke="#283238" stroke-width="1">
    <path d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200M100 0V420M200 0V420M300 0V420M400 0V420M500 0V420M600 0V420M700 0V420M800 0V420M900 0V420M1000 0V420M1100 0V420" opacity=".35"/>
  </g>
  <text x="56" y="68" fill="#befc3c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700" letter-spacing="4">WHAT IT DOES</text>
  <text x="56" y="108" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Move useful text and files without opening a heavy app</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2l8 4-8 4z" fill="#befc3c"/></marker>
  </defs>
  <g font-family="Inter, Arial, sans-serif" text-anchor="middle">
    <rect x="58" y="178" width="210" height="144" rx="18" fill="#111719" stroke="#39464d"/>
    <text x="163" y="226" fill="#befc3c" font-size="44" font-weight="800">01</text>
    <text x="163" y="268" fill="#f8fafc" font-size="22" font-weight="700">Pair once</text>
    <text x="163" y="296" fill="#8da2bf" font-size="16">QR or short code</text>
    <path d="M285 250H372" stroke="#befc3c" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="388" y="178" width="210" height="144" rx="18" fill="#111719" stroke="#39464d"/>
    <text x="493" y="226" fill="#befc3c" font-size="44" font-weight="800">02</text>
    <text x="493" y="268" fill="#f8fafc" font-size="22" font-weight="700">Paste or drop</text>
    <text x="493" y="296" fill="#8da2bf" font-size="16">Markdown, images, files</text>
    <path d="M615 250H702" stroke="#befc3c" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="718" y="178" width="210" height="144" rx="18" fill="#111719" stroke="#39464d"/>
    <text x="823" y="226" fill="#befc3c" font-size="44" font-weight="800">03</text>
    <text x="823" y="268" fill="#f8fafc" font-size="22" font-weight="700">Send</text>
    <text x="823" y="296" fill="#8da2bf" font-size="16">Realtime queue</text>
    <path d="M945 250H1032" stroke="#befc3c" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="1048" y="178" width="110" height="144" rx="18" fill="#1d2a18" stroke="#86bf1f"/>
    <text x="1103" y="226" fill="#befc3c" font-size="44" font-weight="800">04</text>
    <text x="1103" y="268" fill="#f8fafc" font-size="22" font-weight="700">Copy</text>
    <text x="1103" y="296" fill="#8da2bf" font-size="16">On device</text>
  </g>
</svg>
